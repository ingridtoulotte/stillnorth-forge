name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} · py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Compile (syntax check, stdlib only)
        run: python -m compileall -q stillnorth tests
      - name: Extraction tests (no GPU, no deps)
        run: python tests/test_extract.py
      - name: Validate config + workflow node maps
        run: python tests/test_config.py
      - name: Server + robustness tests (sandbox, outputs, retry)
        run: python tests/test_server.py
      - name: Assembler tests (selection, usage buckets, retention, preview)
        run: python tests/test_assembler.py
      - name: Slideshow lane tests (loop-graph math, no deps)
        run: python tests/test_slideshow.py
      - name: Publish lane tests (tier/audio math, no deps)
        run: python tests/test_publish.py
